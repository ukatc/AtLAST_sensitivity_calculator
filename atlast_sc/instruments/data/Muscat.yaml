name: "Muscat"
allowed_ranges:
  observing_frequency: 
    ranges: [(250.0-300.0)]
    unit: GHz
  bandwidth: 
    ranges: [(10-80)]
    unit: GHz
chip_and_cold_optics_efficiency:  # MUSCAT doesn't separate chip and cold optics efficiencies
  value: 0.5
cold_optics_temperature: # Temperature of the cold optics - not currently used
  value: 0.3
  unit: K
band_gap: # gap energy
  value: 200e-6
  unit: eV
pair_breaking_efficiency: # pair-breaking efficiency
  value: 0.4