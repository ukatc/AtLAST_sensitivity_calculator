name: sens-calc
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - astropy=5.3
  - numpy=1.26
  - pytest=7.2
  - pytest-mock=3.10
  - PyYAML=6.0
  - scipy=1.11
  - setuptools=65.5
  - sphinx-rtd-theme=3.1
  - myst-parser==2.0.0
  - plantuml=1.2026
  - nbsphinx==0.9
  - python-dotenv=0.21
  - pydantic=2.12
  - pandoc
  - build
  - flake8
  - sphinx-copybutton
  - fastapi=0.128
  - uvicorn=0.21
